<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6fa;color:#333}
#toolbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#fff;border-bottom:1px solid #e8e8e8;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:100;position:relative;flex-wrap:wrap}
#brand{display:flex;align-items:center;gap:8px;white-space:nowrap}
.brand-icon{font-size:22px;color:#27ae60}
.brand-text{font-size:16px;font-weight:700;color:#333}
#search-box{display:flex;align-items:center;flex:1;max-width:460px;min-width:180px}
#search-input{flex:1;height:36px;padding:0 14px;border:1px solid #d9d9d9;border-right:none;border-radius:6px 0 0 6px;font-size:14px;outline:none;transition:border-color .2s}
#search-input:focus{border-color:#27ae60;box-shadow:0 0 0 2px rgba(39,174,96,.15)}
#search-btn{height:36px;padding:0 20px;border:none;border-radius:0 6px 6px 0;background:#27ae60;color:#fff;font-size:14px;cursor:pointer;transition:background .2s}
#search-btn:hover{background:#219a52}
#search-btn:disabled{background:#a0aec0;cursor:not-allowed}
#toolbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
#toolbar-actions button,#btn-add{height:32px;padding:0 14px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;font-size:13px;color:#555;cursor:pointer;transition:all .2s}
#toolbar-actions button:hover,#btn-add:hover{border-color:#27ae60;color:#27ae60;background:#f0faf4}
#btn-add{background:#27ae60;color:#fff;border-color:#27ae60;font-weight:600}
#btn-add:hover{background:#219a52;color:#fff}
.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:#f0faf4;color:#27ae60;white-space:nowrap}
#kg-container{position:absolute;top:60px;left:0;right:0;bottom:28px;background:linear-gradient(135deg,#fafbfd 0%,#f0f2f8 100%);overflow:hidden}
#status-message{display:none;position:absolute;top:70px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;font-size:14px;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.1);pointer-events:none}
.status-info{display:block!important;background:#e6f7ff;border:1px solid #91d5ff;color:#0050b3}
.status-success{display:block!important;background:#f6ffed;border:1px solid #b7eb8f;color:#389e0d}
.status-error{display:block!important;background:#fff2f0;border:1px solid #ffccc7;color:#cf1322}
.node-group circle{transition:stroke-width .15s}
.node-group:hover circle{stroke-width:3.5px;filter:brightness(1.1) drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.node-glow{animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{stroke-opacity:.3}50%{stroke-opacity:.6}}
.node-label{pointer-events:none;text-shadow:0 1px 2px rgba(255,255,255,.9);font-size:11px}
.link{transition:stroke .2s}
.link-group:hover .link{stroke:#27ae60;stroke-width:2.5px}
.link-label{pointer-events:none;text-shadow:0 1px 1px rgba(255,255,255,.8);font-size:10px;fill:#888}
#node-tooltip{display:none;position:absolute;padding:8px 14px;background:rgba(255,255,255,.95);border:1px solid #d9d9d9;border-radius:6px;font-size:13px;color:#333;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;pointer-events:none;white-space:nowrap}
#legend-panel{position:absolute;right:16px;top:80px;padding:12px 16px;background:rgba(255,255,255,.92);border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:50;font-size:12px}
.legend-title{font-size:12px;font-weight:700;color:#999;margin-bottom:8px;letter-spacing:1px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:#666}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
#footer-bar{position:absolute;bottom:0;left:0;right:0;height:28px;display:flex;align-items:center;gap:20px;padding:0 20px;background:#fff;border-top:1px solid #e8e8e8;font-size:11px;color:#999;z-index:100}
#footer-hint{margin-left:auto;color:#bbb}

/* 添加弹窗 */
#add-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center}
#add-modal.show{display:flex}
#add-modal .modal-box,#manage-modal .modal-box{background:#fff;border-radius:12px;padding:28px 32px;width:460px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
#add-modal h3,#manage-modal h3{margin-bottom:6px;font-size:18px;color:#333}
#add-modal .sub,#manage-modal .sub{font-size:12px;color:#999;margin-bottom:18px}
#add-modal label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px;margin-top:14px}
#add-modal input,#add-modal select{width:100%;height:36px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:border-color .2s}
#add-modal input:focus,#add-modal select:focus{border-color:#27ae60;box-shadow:0 0 0 2px rgba(39,174,96,.12)}
#add-modal .hint{font-size:11px;color:#aaa;margin-top:3px}
#add-modal .btn-row,#manage-modal .btn-row{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
#add-modal .btn-row button,#manage-modal .btn-row button{height:36px;padding:0 22px;border-radius:6px;font-size:14px;cursor:pointer;transition:all .2s}
#add-modal .btn-cancel,#manage-modal .btn-cancel{background:#fff;border:1px solid #d9d9d9;color:#666}
#add-modal .btn-cancel:hover,#manage-modal .btn-cancel:hover{background:#f5f5f5}
#add-modal .btn-confirm{background:#27ae60;border:none;color:#fff}
#add-modal .btn-confirm:hover{background:#219a52}

/* 管理弹窗 */
#manage-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center}
#manage-modal.show{display:flex}
#manage-list .mg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:0 0 6px 0;background:#f9fafb;border-radius:6px;font-size:13px;transition:background .15s}
#manage-list .mg-item:hover{background:#f0faf4}
#manage-list .mg-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#manage-list .mg-item .mg-rel{color:#27ae60;font-weight:600;padding:0 4px}
#manage-list .mg-item .mg-del{width:24px;height:24px;border:none;border-radius:50%;background:#fee;color:#e74c3c;font-size:14px;cursor:pointer;flex-shrink:0;line-height:24px;text-align:center;transition:all .15s}
#manage-list .mg-item .mg-del:hover{background:#e74c3c;color:#fff}
#manage-list .mg-empty{text-align:center;color:#bbb;padding:30px 0;font-size:14px}

/* 自定义节点标记 */
.node-group circle.custom{stroke:#f39c12;stroke-width:3px;stroke-dasharray:4 2}

/* 标签搜索 */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-chip{padding:4px 12px;border-radius:14px;font-size:12px;background:#f0faf4;color:#27ae60;border:1px solid #d5f5e3;cursor:pointer;transition:all .15s}
.tag-chip:hover{background:#27ae60;color:#fff}

/* 上传弹窗 */
#upload-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center}
#upload-modal.show{display:flex}
#upload-modal .modal-box{background:#fff;border-radius:12px;padding:28px 32px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
#upload-modal h3{margin-bottom:8px;font-size:18px;color:#333}
#upload-modal .sub{font-size:12px;color:#999;margin-bottom:20px}
.upload-dropzone{border:2px dashed #d9d9d9;border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-dropzone:hover,.upload-dropzone.dragover{border-color:#27ae60;background:#f0faf4}
.upload-dropzone .dz-icon{font-size:36px;margin-bottom:10px}
.upload-dropzone .dz-text{font-size:14px;color:#666}
.upload-dropzone .dz-hint{font-size:12px;color:#aaa;margin-top:6px}
.upload-dropzone.has-file{border-color:#27ae60;background:#f0faf4}
.upload-dropzone.has-file .dz-text{color:#27ae60;font-weight:600}
#upload-modal .btn-row{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
#upload-modal .btn-row button{height:36px;padding:0 22px;border-radius:6px;font-size:14px;cursor:pointer}
#upload-modal .btn-cancel{background:#fff;border:1px solid #d9d9d9;color:#666}
#upload-modal .btn-cancel:hover{background:#f5f5f5}
#upload-modal .btn-confirm{background:#27ae60;border:none;color:#fff;font-weight:600}
#upload-modal .btn-confirm:disabled{background:#ccc;cursor:not-allowed}
#upload-progress-bar{display:none;height:4px;background:#27ae60;border-radius:2px;margin-top:12px;transition:width .3s;width:0}
#upload-progress-text{display:none;font-size:12px;color:#888;margin-top:4px;text-align:center}
</style>
</head>
<body>

<div id="toolbar">
  <div id="brand"><span class="brand-icon">◆</span><span class="brand-text">心理健康知识图谱</span></div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜索心理健康相关概念..." autocomplete="off">
    <button id="search-btn" title="搜索">搜索</button>
  </div>
  <div id="toolbar-actions">
    <button id="btn-add" title="添加节点和关系">+ 添加</button>
    <button id="btn-manage" title="管理手动添加的知识" style="background:#fff;color:#555">管理</button>
    <button id="btn-upload-pdf" title="上传文档AI提取图谱" style="background:#8e44ad;color:#fff;border-color:#8e44ad;font-weight:600">上传文档</button>
    <button id="btn-reset">重置</button>
    <button id="btn-fit">适应</button>
    <span id="node-count" class="badge">节点: 0</span>
    <span id="link-count" class="badge">边: 0</span>
  </div>
  <!-- 快捷标签 -->
  <div class="tag-list" id="tag-list" style="flex-basis:100%;padding-bottom:6px;display:none">
    <span class="tag-chip" onclick="quickSearch('心理健康')">心理健康</span>
    <span class="tag-chip" onclick="quickSearch('焦虑')">焦虑</span>
    <span class="tag-chip" onclick="quickSearch('抑郁')">抑郁</span>
    <span class="tag-chip" onclick="quickSearch('压力')">压力</span>
    <span class="tag-chip" onclick="quickSearch('睡眠')">睡眠</span>
    <span class="tag-chip" onclick="quickSearch('情绪管理')">情绪管理</span>
    <span class="tag-chip" onclick="quickSearch('人际关系')">人际关系</span>
    <span class="tag-chip" onclick="quickSearch('认知行为疗法')">认知行为疗法</span>
  </div>
</div>

<div id="kg-container"></div>
<div id="status-message"></div>

<div id="legend-panel">
  <div class="legend-title">图例</div>
  <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span> 根节点</div>
  <div class="legend-item"><span class="legend-dot" style="background:#5470c6"></span> 百科实体</div>
  <div class="legend-item"><span class="legend-dot" style="background:#fac858"></span> 扩展实体</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f39c12;border:2px dashed #f39c12;width:10px;height:10px"></span> 手动添加</div>
  <div class="legend-item"><span class="legend-dot" style="background:#8e44ad"></span> AI文档提取</div>
</div>

<div id="node-tooltip"></div>

<div id="footer-bar">
  <span id="footer-cache">数据: 心理健康知识库</span>
  <span id="footer-elapsed"></span>
  <span id="footer-hint">搜索实体开始探索 · 点击节点扩展 · 点击「+ 添加」录入知识</span>
</div>

<!-- 添加弹窗 -->
<div id="add-modal">
  <div class="modal-box">
    <h3>添加知识节点</h3>
    <p class="sub">手动录入心理健康领域的实体和关系</p>
    <label>源实体（起点）</label>
    <input id="add-source" placeholder="例如：抑郁症" list="entity-suggestions">
    <div class="hint">可以是已有节点，也可以是新节点</div>
    <label>关系类型</label>
    <select id="add-relation">
      <option value="">-- 选择关系 --</option>
      <option value="症状">症状</option>
      <option value="影响因素">影响因素</option>
      <option value="改善方法">改善方法</option>
      <option value="治疗方式">治疗方式</option>
      <option value="相关概念">相关概念</option>
      <option value="类型">类型</option>
      <option value="关联">关联</option>
      <option value="预防措施">预防措施</option>
      <option value="易感人群">易感人群</option>
      <option value="评估工具">评估工具</option>
      <option value="包含">包含</option>
    </select>
    <div class="hint">描述两个实体之间的关联</div>
    <label>目标实体（终点）</label>
    <input id="add-target" placeholder="例如：情绪低落" list="entity-suggestions">
    <datalist id="entity-suggestions"></datalist>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-confirm" onclick="addEntity()">确认添加</button>
    </div>
  </div>
</div>

<!-- 管理弹窗 -->
<div id="manage-modal">
  <div class="modal-box">
    <h3>管理手动添加的知识</h3>
    <p class="sub" id="manage-count">共 0 条记录</p>
    <div id="manage-list" style="max-height:300px;overflow-y:auto"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeManageModal()">关闭</button>
      <button class="btn-confirm" style="background:#e74c3c" onclick="clearAllCustom()">清空全部</button>
    </div>
  </div>
</div>

<!-- 上传文档弹窗 -->
<div id="upload-modal">
  <div class="modal-box">
    <h3>上传文档生成知识图谱</h3>
    <p class="sub">AI 自动提取文档中的实体关系，生成可视化知识图谱</p>
    <div class="upload-dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="dz-icon">📄</div>
      <div class="dz-text" id="dz-text">点击选择或拖拽文件</div>
      <div class="dz-hint">PDF / TXT，最大 10MB</div>
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt" style="display:none">
    <div id="upload-progress-bar"></div>
    <div id="upload-progress-text"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeUploadModal()">取消</button>
      <button class="btn-confirm" id="btn-upload" onclick="processUpload()" disabled>开始解析</button>
    </div>
  </div>
</div>

var CUSTOM_TRIPLETS = JSON.parse(sessionStorage.getItem('kg_custom') || '[]');

// ============ 数据查询 ============
function normTriplets(entityName, avpList) {
  var result = [];
  for (var i = 0; i < avpList.length; i++) {
    var row = avpList[i];
    if (row.length >= 2) result.push({entity: entityName, relation: row[0], value: row[1]});
  }
  return result;
}

function queryKnowledge(entityName, callback) {
  var apiUrl = 'https://api.ownthink.com/kg/knowledge?entity=' + encodeURIComponent(entityName);
  fetch(apiUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.message === 'success' && data.data && data.data.avp && data.data.avp.length > 0) {
        var triplets = [];
        var avpList = data.data.avp;
        for (var i = 0; i < avpList.length; i++) {
          var row = avpList[i];
          if (row.length >= 2) triplets.push({entity: entityName, relation: row[0], value: row[1]});
        }
        // 合并自定义数据
        var merged = triplets.concat(getCustomTriplets(entityName));
        callback(null, merged, false);
        return;
      }
      fallback(entityName, callback);
    }).catch(function() { fallback(entityName, callback); });
}

function fallback(entityName, callback) {
  var triplets = [];
  for (var key in FALLBACK_KB) {
    if (entityName.indexOf(key) >= 0 || key.indexOf(entityName) >= 0) {
      triplets = triplets.concat(normTriplets(key, FALLBACK_KB[key]));
    }
  }
  // 合并自定义数据
  triplets = triplets.concat(getCustomTriplets(entityName));
  // 也搜索自定义数据中 target 匹配的
  for (var i = 0; i < CUSTOM_TRIPLETS.length; i++) {
    var t = CUSTOM_TRIPLETS[i];
    if (t.value === entityName || t.entity === entityName) {
      if (!triplets.some(function(ex){return ex.entity===t.entity&&ex.relation===t.relation&&ex.value===t.value})) {
        triplets.push(t);
      }
    }
  }
  callback(null, triplets, true);
}

function getCustomTriplets(entityName) {
  return CUSTOM_TRIPLETS.filter(function(t) { return t.entity === entityName; });
}

// ============ D3 图谱 ============
var kgVis;
(function() {
  function KgVis(cid) {
    this.container = d3.select('#' + cid);
    this.svg = null; this.mainGroup = null; this.simulation = null; this.zoom = null;
    this.graphData = {nodes:[], links:[]}; this.expandedNodes = new Set(); this.currentRoot = '';
    this.colors = ['#5470c6','#91cc75','#fac858','#ee6666','#73c0de','#3ba272','#fc8452','#9a60b4'];
    this.rootColor = '#e74c3c';
  }

  KgVis.prototype.init = function(rootNode) {
    this.currentRoot = rootNode;
    var w = this.container.node().clientWidth, h = this.container.node().clientHeight, self = this;
    this.svg = this.container.append('svg').attr('width',w).attr('height',h).style('cursor','grab');
    var defs = this.svg.append('defs');
    defs.append('marker').attr('id','arrowhead').attr('viewBox','0 -5 10 10')
      .attr('refX',22).attr('refY',0).attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto')
      .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#999');
    this.zoom = d3.zoom().scaleExtent([0.1,5]).on('zoom',function(e){self.mainGroup.attr('transform',e.transform)});
    this.svg.call(this.zoom);
    this.mainGroup = this.svg.append('g');
    this.simulation = d3.forceSimulation()
      .force('link',d3.forceLink().id(function(d){return d.id}).distance(120))
      .force('charge',d3.forceManyBody().strength(-350))
      .force('center',d3.forceCenter(w/2,h/2))
      .force('collision',d3.forceCollide().radius(25)).alphaDecay(0.02);
    this.fetchAndRender(rootNode, false);
  };

  KgVis.prototype.transformToGraph = function(triplets, rootName) {
    var nodes=[], links=[], nodeSet=new Set();
    nodes.push({id:rootName, group:1, is_root:true});
    nodeSet.add(rootName);
    for (var i=0; i<triplets.length; i++) {
      var t = triplets[i], s = t.entity||'', v = t.value||'';
      if (!s||!v) continue;
      for (var j=0; j<2; j++) { var n=j===0?s:v; if(n&&!nodeSet.has(n)){nodes.push({id:n,group:(nodes.length%7)+1,is_root:false});nodeSet.add(n);} }
      // 标记自定义边
      var isCustom = CUSTOM_TRIPLETS.some(function(c){return c.entity===s&&c.relation===t.relation&&c.value===v;});
      links.push({source:s, target:v, value:t.relation||'', custom: isCustom});
    }
    return {nodes:nodes, links:links};
  };

  KgVis.prototype.mergeGraph = function(oldData, newData) {
    var mn=oldData.nodes.slice(), ml=oldData.links.slice();
    var ns=new Set(oldData.nodes.map(function(n){return n.id}));
    var ls=new Set(oldData.links.map(function(l){return (l.source.id||l.source)+'|'+(l.value||'')+'|'+(l.target.id||l.target)}));
    for (var i=0; i<newData.nodes.length; i++) { var nd=newData.nodes[i]; if(!ns.has(nd.id)){mn.push(nd);ns.add(nd.id);} }
    for (var i=0; i<newData.links.length; i++) { var lk=newData.links[i]; var k=lk.source+'|'+lk.value+'|'+lk.target; if(!ls.has(k)){ml.push(lk);ls.add(k);} }
    return {nodes:mn, links:ml};
  };

  KgVis.prototype.resetAndExplore = function(name) {
    this.currentRoot = name; this.expandedNodes = new Set(); this.expandedNodes.add(name);
    this.graphData = {nodes:[],links:[]}; this.fetchAndRender(name, false);
  };

  KgVis.prototype.fetchAndRender = function(name, incremental) {
    var self = this;
    self.showStatus('正在加载「'+name+'」...','info');
    document.getElementById('search-btn').disabled = true;
    document.getElementById('search-btn').textContent = '加载中...';
    queryKnowledge(name, function(err, triplets, fromFallback) {
      if (triplets.length === 0) {
        self.showStatus('暂无「'+name+'」的知识，可以点击「+ 添加」录入','info');
        document.getElementById('search-btn').disabled = false;
        document.getElementById('search-btn').textContent = '搜索';
        return;
      }
      var newData = self.transformToGraph(triplets, name);
      var dataToRender = incremental ? self.mergeGraph(self.graphData, newData) : newData;
      if (!incremental) { self.expandedNodes = new Set(); self.expandedNodes.add(name); }
      else { self.expandedNodes.add(name); }
      self.graphData = dataToRender; self.currentRoot = name;
      self.updateGraph(dataToRender);
      document.getElementById('search-btn').disabled = false;
      document.getElementById('search-btn').textContent = '搜索';
      document.getElementById('node-count').textContent = '节点: '+dataToRender.nodes.length;
      document.getElementById('link-count').textContent = '边: '+dataToRender.links.length;
      var src = fromFallback ? '本地知识库' : 'OwnThink百科';
      if (CUSTOM_TRIPLETS.length>0) src += ' + 手动添加('+CUSTOM_TRIPLETS.length+'条)';
      document.getElementById('footer-elapsed').textContent = '来源: '+src;
      self.showStatus('已加载 '+dataToRender.nodes.length+' 节点，'+dataToRender.links.length+' 关系', 'success');
      if (window.parent && window.parent !== window) {
        try { window.parent.postMessage({type:'kg_loaded', node:name}, '*'); } catch(e) {}
      }
    });
  };

  KgVis.prototype.updateGraph = function(data) {
    var self = this;
    var linkSel = this.mainGroup.selectAll('.link-group').data(data.links, function(d){return (d.source.id||d.source)+'|'+d.value+'|'+(d.target.id||d.target)});
    var linkEnter = linkSel.enter().append('g').attr('class','link-group');
    linkEnter.append('line').attr('class','link').attr('stroke',function(d){return d.custom?'#f39c12':'#bbb'})
      .attr('stroke-width',function(d){return d.custom?2:1.5}).attr('stroke-opacity',0.7)
      .attr('stroke-dasharray',function(d){return d.custom?'6 3':null}).attr('marker-end','url(#arrowhead)');
    linkEnter.append('text').attr('class','link-label').attr('font-size',10).attr('fill','#888')
      .attr('text-anchor','middle').attr('dy',-5).text(function(d){return d.value||''});
    linkSel.exit().remove();
    var links = linkEnter.merge(linkSel);
    var nodeSel = this.mainGroup.selectAll('.node-group').data(data.nodes, function(d){return d.id});
    var nodeEnter = nodeSel.enter().append('g').attr('class','node-group').attr('cursor','pointer')
      .call(d3.drag()
        .on('start',function(e,d){if(!e.active)self.simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
        .on('drag',function(e,d){d.fx=e.x;d.fy=e.y;})
        .on('end',function(e,d){if(!e.active)self.simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
      .on('click',function(e,d){e.stopPropagation();self.onNodeClick(d);})
      .on('mouseenter',function(e,d){
        var t=document.getElementById('node-tooltip'); t.style.display='block';
        t.innerHTML='<strong>'+d.id+'</strong>'+(d.is_root?'<br><em>根节点</em>':'')+
          (self.expandedNodes.has(d.id)?'<br><small>已展开</small>':'<br><small>点击扩展</small>');
        t.style.left=(e.pageX+15)+'px';t.style.top=(e.pageY-10)+'px';
      }).on('mouseleave',function(){document.getElementById('node-tooltip').style.display='none';});
    // 检测是否自定义节点
    var customNodes = new Set();
    for (var i=0; i<CUSTOM_TRIPLETS.length; i++) { customNodes.add(CUSTOM_TRIPLETS[i].entity); customNodes.add(CUSTOM_TRIPLETS[i].value); }
    nodeEnter.append('circle').attr('r',function(d){return d.is_root?18:Math.min(Math.sqrt((d.weight||1))*4+8,22);})
      .attr('fill',function(d){if(d.is_root)return self.rootColor;return self.colors[(d.group||1)%self.colors.length];})
      .attr('stroke','#fff').attr('stroke-width',2.5)
      .attr('class',function(d){return customNodes.has(d.id)?'custom':''});
    nodeEnter.filter(function(d){return d.is_root}).append('circle').attr('class','node-glow')
      .attr('r',24).attr('fill','none').attr('stroke',self.rootColor).attr('stroke-width',2).attr('stroke-opacity',0.3);
    nodeEnter.append('text').attr('class','node-label')
      .attr('dy',function(d){var r=d.is_root?18:Math.min(Math.sqrt((d.weight||1))*4+8,22);return r+14;})
      .attr('text-anchor','middle').attr('fill','#333')
      .text(function(d){return d.id.length>8?d.id.substring(0,7)+'…':d.id;});
    nodeSel.exit().remove();
    var nodes = nodeEnter.merge(nodeSel);
    this.simulation.nodes(data.nodes); this.simulation.force('link').links(data.links);
    this.simulation.on('tick',function(){
      links.select('line').attr('x1',function(d){return d.source.x}).attr('y1',function(d){return d.source.y})
        .attr('x2',function(d){return d.target.x}).attr('y2',function(d){return d.target.y});
      links.select('text').attr('x',function(d){return (d.source.x+d.target.x)/2}).attr('y',function(d){return (d.source.y+d.target.y)/2});
      nodes.attr('transform',function(d){return 'translate('+d.x+','+d.y+')'});
    });
    this.simulation.alpha(0.5).restart();
    // 更新实体建议列表
    updateEntitySuggestions(data.nodes);
  };

  KgVis.prototype.onNodeClick = function(d) {
    if (this.expandedNodes.has(d.id)) { this.showStatus('已展开','info'); return; }
    this.fetchAndRender(d.id, true);
  };
  KgVis.prototype.fitToScreen = function() {
    var w=this.container.node().clientWidth,h=this.container.node().clientHeight;
    var b=this.mainGroup.node().getBBox(); if(b.width===0)return;
    var s=Math.min(0.9,Math.min(w/b.width,h/b.height)*0.85);
    var t=[w/2-s*(b.x+b.width/2),h/2-s*(b.y+b.height/2)];
    this.svg.transition().duration(750).call(this.zoom.transform,d3.zoomIdentity.translate(t[0],t[1]).scale(s));
  };
  KgVis.prototype.resize = function() {
    var w=this.container.node().clientWidth,h=this.container.node().clientHeight;
    this.svg.attr('width',w).attr('height',h);
    this.simulation.force('center',d3.forceCenter(w/2,h/2)).alpha(0.1).restart();
  };
  KgVis.prototype.showStatus = function(msg, type) {
    var el=document.getElementById('status-message');el.style.display='block';el.textContent=msg;el.className='status-'+type;
    if(type!=='info'){clearTimeout(this._st);this._st=setTimeout(function(){el.style.display='none';},3000);}
  };
  window.KgVis = KgVis;
})();

function addEntity() {
  var src = document.getElementById('add-source').value.trim();
  var rel = document.getElementById('add-relation').value;
  var tgt = document.getElementById('add-target').value.trim();
  if (!src || !rel || !tgt) { alert('请填写完整的源实体、关系和目标实体'); return; }
  // 检查重复
  var dup = CUSTOM_TRIPLETS.some(function(t){return t.entity===src && t.relation===rel && t.value===tgt;});
  if (dup) { alert('该关系已存在'); return; }
  CUSTOM_TRIPLETS.push({entity:src, relation:rel, value:tgt});
  sessionStorage.setItem('kg_custom', JSON.stringify(CUSTOM_TRIPLETS));
  closeAddModal();
  // 重新渲染当前图谱
  kgVis.resetAndExplore(kgVis.currentRoot || src);
  kgVis.showStatus('已添加: '+src+' —'+rel+'→ '+tgt, 'success');
}

function deleteCustom(index) {
  if (!confirm('确定删除这条知识关系吗？')) return;
  CUSTOM_TRIPLETS.splice(index, 1);
  sessionStorage.setItem('kg_custom', JSON.stringify(CUSTOM_TRIPLETS));

  openManageModal();
  // 刷新图谱
  if (kgVis && kgVis.currentRoot) {
    kgVis.resetAndExplore(kgVis.currentRoot);
  }
  kgVis.showStatus('已删除 1 条记录', 'success');
}

function clearAllCustom() {
  if (CUSTOM_TRIPLETS.length === 0) return;

    kgVis.resetAndExplore(kgVis.currentRoot);
  }
  kgVis.showStatus('已清空所有手动添加的知识', 'success');
}

  return bytes < 1024*1024 ? (bytes/1024).toFixed(1)+'KB' : (bytes/1024/1024).toFixed(1)+'MB';
}

// PDF 文本提取（浏览器端）
function extractPdfText(file) {
  return new Promise(function(resolve, reject) {
    if (!window.pdfjsLib) {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function(){
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        doExtract(file, resolve, reject);
      };
      s.onerror = function(){ reject(new Error('PDF.js 加载失败，请检查网络')); };
      document.head.appendChild(s);
    } else {
      doExtract(file, resolve, reject);
    }
  });
}

function doExtract(file, resolve, reject) {
  var reader = new FileReader();
  reader.onload = async function(){
    try {
      var pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
      var text = '';
      for (var i=1; i<=pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        text += content.items.map(function(it){return it.str;}).join(' ')+'\n';
      }
      resolve(text.trim());
    } catch(e){ reject(e); }
  };
  reader.readAsArrayBuffer(file);
}

// 调智谱 AI 提取实体关系
async function callAI(text) {
  var prompt = [
    '你是一个知识图谱提取专家。从以下文本中提取实体和关系。',
    '严格输出JSON格式（不要markdown，不要任何解释）：',
    '{"nodes":[{"id":"实体名","group":1}],"links":[{"source":"实体A","target":"实体B","value":"关系描述"}]}',
    '规则：',
    '1. 实体去重，每个实体只出现一次',
    '2. 关系用2-4字简短描述（如「导致」「包含」「改善」「症状」「治疗」等）',
    '3. 最多提取30条关系',
    '4. 优先提取心理健康、病理相关的知识',
    '文本内容：\n' + text
  ].join('\n');

  var resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+ZHIPU_API_KEY },
    body: JSON.stringify({
      model: 'glm-4-flash',
      messages: [{role:'user', content:prompt}],
      temperature: 0.3, max_tokens: 4000
    })
  });

  if (!resp.ok) {
    var errText = await resp.text();
    throw new Error('API 调用失败('+resp.status+'): '+errText.substring(0,200));
  }

  var data = await resp.json();
  if (!data.choices || !data.choices[0]) throw new Error('AI 返回格式异常');

  var content = data.choices[0].message.content;
  // 尝试提取JSON
  var m = content.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('AI 未返回有效JSON: '+content.substring(0,100));
  var graph = JSON.parse(m[0]);

  if (!graph.nodes || !graph.links) throw new Error('AI 返回缺少 nodes 或 links');
  return graph;
}

// 主流程
async function processUpload() {
  if (!selectedFile) return;
  var btn = document.getElementById('btn-upload');
  btn.disabled = true; btn.textContent = '解析中...';

  try {
    showUploadProgress('正在提取文本...', 20);
    var text;
    if (selectedFile.name.endsWith('.pdf')) {
      text = await extractPdfText(selectedFile);
    } else {
      text = await selectedFile.text();
    }
    if (!text || text.length < 10) throw new Error('未能提取到有效文本');

    // 截断过长文本
    if (text.length > 15000) text = text.substring(0, 15000) + '...(已截断)';

    showUploadProgress('文本提取完成（'+text.length+'字符），正在 AI 分析...', 50);

    var graph = await callAI(text);

    showUploadProgress('图谱生成完成：'+graph.nodes.length+' 实体，'+graph.links.length+' 关系', 100);

    // 合并到自定义数据（标记 fromDoc:true）
    for (var i=0; i<graph.links.length; i++) {
      var l = graph.links[i];
      var dup = CUSTOM_TRIPLETS.some(function(t){
        return t.entity===l.source && t.relation===l.value && t.value===l.target;
      });
      if (!dup) CUSTOM_TRIPLETS.push({entity:l.source, relation:l.value, value:l.target, fromDoc:true});
    }
    sessionStorage.setItem('kg_custom', JSON.stringify(CUSTOM_TRIPLETS));

    closeUploadModal();
    // 用AI提取结果中的第一个实体作为根节点重绘
    var firstNode = graph.nodes.length>0 ? graph.nodes[0].id : '心理健康';
    kgVis.resetAndExplore(firstNode);
    kgVis.showStatus('已从文档提取 '+graph.nodes.length+' 实体，'+graph.links.length+' 关系', 'success');

  } catch(e) {
    alert('解析失败: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '开始解析';
  setTimeout(function(){
    document.getElementById('upload-progress-bar').style.display = 'none';
    document.getElementById('upload-progress-text').style.display = 'none';
  }, 2000);
}

  // ============ 初始化 ============
  function initApp() {
    var params = new URLSearchParams(window.location.search);
    var initialRoot = params.get('root_node') || '心理健康';
    document.getElementById('search-input').value = initialRoot;
    document.getElementById('tag-list').style.display = 'flex';

    kgVis = new KgVis('kg-container');
    kgVis.init(initialRoot);

    document.getElementById('search-btn').addEventListener('click', function(){
      var q = document.getElementById('search-input').value.trim();
      if (q) kgVis.resetAndExplore(q);
    });
    document.getElementById('search-input').addEventListener('keydown', function(e){
      if (e.key==='Enter') { var q=e.target.value.trim(); if(q) kgVis.resetAndExplore(q); }
    });
    document.getElementById('btn-reset').addEventListener('click', function(){
      var q = document.getElementById('search-input').value.trim()||'心理健康';
      kgVis.resetAndExplore(q);
    });
    document.getElementById('btn-fit').addEventListener('click', function(){ kgVis.fitToScreen(); });
    document.getElementById('btn-add').addEventListener('click', openAddModal);
    document.getElementById('btn-manage').addEventListener('click', openManageModal);
    document.getElementById('btn-upload-pdf').addEventListener('click', openUploadModal);
    document.addEventListener('keydown', function(e) { if (e.key==='Escape') { closeAddModal(); closeManageModal(); closeUploadModal(); } });
    document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) closeAddModal(); });
    document.getElementById('manage-modal').addEventListener('click', function(e) { if (e.target === this) closeManageModal(); });
    document.getElementById('upload-modal').addEventListener('click', function(e) { if (e.target === this) closeUploadModal(); });
    var rt;
    window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(function(){kgVis.resize();},200); });
  }

  // 兼容 DOM 已就绪和未就绪两种情况
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
  } else {
    initApp();
  }
</script>
